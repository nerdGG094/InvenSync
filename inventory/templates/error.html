{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height:calc(100vh - 220px)">
  <div class="ph-icon mb-3" style="width:72px;height:72px;font-size:2rem;background:linear-gradient(135deg,#f44336,#7a1f17)">
    <i class="bi bi-exclamation-triangle"></i>
  </div>
  <h1 class="display-5 fw-bold mb-2">{{ title }}</h1>
  <p class="text-muted fs-5 mb-4" style="max-width:480px">{{ message }}</p>
  <div class="d-flex gap-2">
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary"><i class="bi bi-house"></i> Ir para o início</a>
    <a href="javascript:history.back()" class="btn btn-outline-light"><i class="bi bi-arrow-left"></i> Voltar</a>
  </div>
</div>
{% endblock %}
